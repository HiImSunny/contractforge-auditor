# ContractForge Auditor — Render deployment manifest
services:
  - type: web
    name: contractforge-auditor-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: PORT
        value: "8000"
    healthCheckPath: /api/health
    autoDeploy: false
