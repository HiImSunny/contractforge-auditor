# ContractForge Auditor — Lobster Trap Policy Pack
# Deep prompt inspection rules for legal contract governance pipeline.
# Schema: https://github.com/veeainc/lobstertrap
#
# Lobster Trap performs pre-flight DPI on every prompt before it reaches
# Gemini. Rules use first-match-wins logic (higher priority = evaluated first).

version: "1.0"
policy_name: "contractforge-legal-governance"
default_action: ALLOW

ingress_rules:

  # ── 1. PROMPT INJECTION — highest priority ─────────────────────────────
  - name: block_prompt_injection
    description: "Block prompt injection attempts embedded in contract content"
    priority: 100
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: prompt injection detected in contract content."
    conditions:
      - field: contains_injection_patterns
        match_type: boolean
        value: true

  # ── 2. ROLE IMPERSONATION ───────────────────────────────────────────────
  - name: block_role_impersonation
    description: "Block attempts to override agent role via contract text"
    priority: 98
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: role impersonation attempt detected."
    conditions:
      - field: contains_role_impersonation
        match_type: boolean
        value: true

  # ── 3. DATA EXFILTRATION ────────────────────────────────────────────────
  - name: block_data_exfiltration
    description: "Block prompts containing data exfiltration patterns"
    priority: 95
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: data exfiltration pattern detected."
    conditions:
      - field: contains_exfiltration
        match_type: boolean
        value: true

  # ── 4. CREDENTIAL LEAK IN PROMPT ───────────────────────────────────────
  - name: block_credentials_in_prompt
    description: "Block prompts that contain API keys or credentials"
    priority: 92
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: credentials detected in prompt."
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true

  # ── 5. DANGEROUS SYSTEM COMMANDS ───────────────────────────────────────
  - name: block_system_commands
    description: "Block prompts with dangerous shell commands embedded in contract"
    priority: 88
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: dangerous system command detected."
    conditions:
      - field: contains_system_commands
        match_type: boolean
        value: true
      - field: risk_score
        match_type: threshold
        value: 0.3

  # ── 6. SENSITIVE PATH ACCESS ────────────────────────────────────────────
  - name: block_sensitive_paths
    description: "Block prompts targeting sensitive system paths"
    priority: 85
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: sensitive path access denied."
    conditions:
      - field: contains_sensitive_paths
        match_type: boolean
        value: true

  # ── 7. OBFUSCATION / EVASION ────────────────────────────────────────────
  - name: block_obfuscation
    description: "Block prompts using encoding or obfuscation to evade detection"
    priority: 82
    action: DENY
    deny_message: "[CONTRACTFORGE] Blocked: obfuscation/evasion technique detected."
    conditions:
      - field: contains_obfuscation
        match_type: boolean
        value: true

  # ── 8. HIGH RISK SCORE — QUARANTINE ────────────────────────────────────
  - name: quarantine_high_risk
    description: "Quarantine prompts with very high composite risk score"
    priority: 75
    action: QUARANTINE
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.75

  # ── 9. MEDIUM RISK — LOG FOR AUDIT ─────────────────────────────────────
  - name: log_medium_risk
    description: "Log medium-risk prompts for governance audit trail"
    priority: 50
    action: LOG
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.4

  # ── 10. LOG ALL AGENT CALLS ─────────────────────────────────────────────
  - name: log_all_agent_calls
    description: "Log every ContractForge agent call for full audit trail"
    priority: 10
    action: LOG
    conditions:
      - field: intent_category
        match_type: regex
        value: ".*"

egress_rules:

  # ── 1. BLOCK CREDENTIAL LEAK IN RESPONSE ───────────────────────────────
  - name: block_credential_leak_response
    description: "Block model responses that contain credentials"
    priority: 100
    action: DENY
    deny_message: "[CONTRACTFORGE] Output blocked: credentials detected in response."
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true

  # ── 2. BLOCK PII LEAK IN RESPONSE ──────────────────────────────────────
  - name: block_pii_leak_response
    description: "Block model responses that contain PII (defence-in-depth after app-level redaction)"
    priority: 90
    action: DENY
    deny_message: "[CONTRACTFORGE] Output blocked: PII detected in response."
    conditions:
      - field: contains_pii
        match_type: boolean
        value: true

  # ── 3. LOG HIGH-RISK RESPONSES ──────────────────────────────────────────
  - name: log_high_risk_response
    description: "Log high-risk model responses for schema drift monitoring"
    priority: 60
    action: LOG
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.5

rate_limits:
  requests_per_minute: 30
  requests_per_hour: 300
  burst_threshold: 10

network:
  egress_policy: allowlist
  allowed_domains:
    - "generativelanguage.googleapis.com"
    - "aistudio.google.com"
  denied_domains:
    - "*.onion"
    - "pastebin.com"
    - "requestbin.com"

filesystem:
  denied_paths:
    - "/etc/**"
    - "/root/**"
    - "**/.ssh/**"
    - "**/.env"
    - "**/*secret*"
    - "**/*password*"
    - "**/*api_key*"
