# ContractForge Auditor — Local development stack
#
# Services:
#   lobstertrap  — Veea Lobster Trap DPI proxy (pre-flight prompt inspection)
#   backend      — FastAPI app (Python 3.12)
#
# How it works:
#   Before every Gemini call, the backend POSTs the prompt to Lobster Trap's
#   /v1/chat/completions endpoint. Lobster Trap inspects the prompt using DPI
#   and returns a verdict in the _lobstertrap field. If verdict is DENY or
#   QUARANTINE, the backend raises LobsterTrapBlockedError and never calls
#   Gemini. If ALLOW, the backend calls Gemini directly as normal.
#
#   ContractForge agents → Lobster Trap (:8080) [inspect only]
#                                  ↓ ALLOW
#   ContractForge agents → Gemini API (direct)
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and set GOOGLE_API_KEY
#   2. docker compose up --build
#   3. Backend API:        http://localhost:8000/api/health
#      Lobster Trap proxy: http://localhost:8080
#      Dashboard UI:       http://localhost:8080/_lobstertrap/
#
# Build Lobster Trap from source (requires Go 1.22+):
#   git clone https://github.com/veeainc/lobstertrap.git
#   cd lobstertrap && make build
#   Copy the binary to ./lobstertrap-bin/lobstertrap

version: "3.9"

services:

  # ── Lobster Trap DPI Inspector ─────────────────────────────────────────────
  # Build from source: https://github.com/veeainc/lobstertrap
  # The proxy listens on :8080. We configure it to forward to a no-op backend
  # (the backend itself) since we only use it for pre-flight DPI inspection,
  # not as a true proxy for Gemini (Gemini uses its own SDK, not OpenAI format).
  lobstertrap:
    build:
      context: .
      dockerfile: Dockerfile.lobstertrap
    ports:
      - "8080:8080"       # DPI inspection endpoint + dashboard
    volumes:
      - ./configs/lobstertrap_policy.yaml:/etc/lobstertrap/policy.yaml:ro
      - lobstertrap-audit:/var/log/lobstertrap
    environment:
      LOBSTERTRAP_POLICY: "/etc/lobstertrap/policy.yaml"
      LOBSTERTRAP_AUDIT_LOG: "/var/log/lobstertrap/audit.jsonl"
    command: >
      ./lobstertrap serve
      --policy /etc/lobstertrap/policy.yaml
      --listen :8080
      --backend http://backend:8000
      --audit-log /var/log/lobstertrap/audit.jsonl
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_lobstertrap/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      # Lobster Trap pre-flight inspection URL
      LOBSTERTRAP_URL: "http://lobstertrap:8080"
    depends_on:
      lobstertrap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  lobstertrap-audit:
